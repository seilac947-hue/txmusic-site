<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>txmusic01 | Links</title>
    <style>
        :root {
            --primary-color: #ffffff;
            --bg-color: #000000;
            --accent-color: #ff0000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Link Sans Product", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Tela de Entrada (Splash Screen) */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease, visibility 1s;
        }

        .splash-logo {
            width: 150px;
            height: 150px;
            margin-bottom: 30px;
            animation: pulseLogo 2s infinite ease-in-out;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .enter-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .enter-btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        /* Conteúdo Principal */
        #main-content {
            display: none;
            width: 100%;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* Fundo Animado */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 580px;
            padding: 40px 20px;
            margin: 0 auto;
            z-index: 1;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 2px solid var(--primary-color);
            background-color: #000;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .profile-name {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-button {
            background-color: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            text-decoration: none;
            padding: 18px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: pulse 2s infinite;
            overflow: hidden;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .link-button:hover {
            background-color: #111111;
            transform: scale(1.08) !important;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.6);
            animation-play-state: paused;
        }

        .link-button svg {
            position: absolute;
            left: 20px;
            width: 24px;
            height: 24px;
        }

        .link-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 100%; }
            100% { left: 100%; }
        }

        .footer {
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.5;
            letter-spacing: 1px;
        }

        /* Controle de Áudio */
        #audio-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            display: none;
        }

        #audio-control svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }
    </style>
</head>
<body>
    <!-- Tela de Entrada -->
    <div id="splash-screen">
        <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663450004895/bFXvpaNEIcsgNXHp.png" alt="Logo" class="splash-logo">
        <button class="enter-btn" onclick="startSite()">Entrar</button>
    </div>

    <canvas id="bg-canvas"></canvas>

    <!-- Conteúdo Principal -->
    <div id="main-content">
        <div class="container">
            <img src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663450004895/bFXvpaNEIcsgNXHp.png" alt="TXMUSIC Profile" class="profile-img">
            <div class="profile-name">@txmusic01</div>
            
            <div class="links-container">
                <a href="https://youtube.com/@txmusic01?si=jHrz0l5imgr9hzcQ" class="link-button" target="_blank">
                    <svg viewBox="0 0 24 24" fill="#FF0000">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
                    </svg>
                    YouTube
                </a>

                <a href="https://www.tiktok.com/@trimexsong?_r=1&_t=ZS-95YppQB7jiy" class="link-button" target="_blank">
                    <svg viewBox="0 0 24 24" fill="#ffffff">
                        <path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.9-.32-1.98-.23-2.81.36-.54.38-.89.98-1.02 1.64-.13.74.02 1.53.4 2.16.38.63.98 1.06 1.69 1.23.71.17 1.47.08 2.11-.26.64-.33 1.13-.9 1.36-1.56.13-.34.18-.71.18-1.08.02-4.69-.01-9.39.01-14.08z"/>
                    </svg>
                    TikTok
                </a>
            </div>

            <div class="footer">
                © 2026 TXMUSIC
            </div>
        </div>
    </div>

    <!-- Controle de Áudio -->
    <div id="audio-control" onclick="toggleAudio()">
        <svg id="audio-icon" viewBox="0 0 24 24">
            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
    </div>

    <audio id="bg-music" loop>
        <source src="https://files.manuscdn.com/user_upload_by_module/session_file/310519663450004895/qimFxWvWETqLNiFr.mp3" type="audio/mpeg">
    </audio>

    <script>
        const audio = document.getElementById('bg-music');
        const splash = document.getElementById('splash-screen');
        const main = document.getElementById('main-content');
        const audioControl = document.getElementById('audio-control');
        const audioIcon = document.getElementById('audio-icon');

        function startSite() {
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.visibility = 'hidden';
                main.style.display = 'block';
                setTimeout(() => {
                    main.style.opacity = '1';
                    document.body.style.overflow = 'auto';
                    audioControl.style.display = 'block';
                }, 100);
            }, 1000);

            audio.play().catch(e => console.log("Erro ao tocar áudio:", e));
        }

        function toggleAudio() {
            if (audio.paused) {
                audio.play();
                audioIcon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
            } else {
                audio.pause();
                audioIcon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
            }
        }

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 60;

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.5,
                    speedY: (Math.random() - 0.5) * 0.5,
                    opacity: Math.random() * 0.5 + 0.2
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
